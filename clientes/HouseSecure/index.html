<style>
/* === SEU CSS EXATAMENTE COMO ESTAVA === */
*{margin:0;padding:0;box-sizing:border-box;}
body {font-family: Arial, sans-serif;background-color:#f4f6f8;text-align:center;}
.container{max-width:1100px;margin:0 auto;padding:0 20px;}
header {
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('img/<!-- IMAGEM HEADER -->.jpg') center/cover no-repeat;
    color:white;
    padding:140px 20px;
    position:relative;
}
header::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(10,31,68,0.60);
}
header .container{position:relative;z-index:1;}
header h1{margin-bottom:20px;font-size:42px;font-weight:800;letter-spacing:1px;}
header p{margin-bottom:35px;font-size:20px;opacity:0.95;}
.btn-whatsapp{background:#25D366;color:white;padding:16px 35px;text-decoration:none;border-radius:50px;font-weight:bold;display:inline-block;position:relative;overflow:hidden;box-shadow:0 8px 25px rgba(0,0,0,0.3);transition:all 0.3s ease;}
.btn-whatsapp:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,0.4);}
section{padding:70px 20px;}
.servicos{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-top:30px;}
.card{background:white;padding:25px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:0.3s;}
.card:hover{transform:translateY(-5px);}
.avaliacoes{background:linear-gradient(rgba(10,31,68,0.8),rgba(10,31,68,0.8)),url('img/estrela.jpg');background-size:cover;background-position:center;color:white;}
.estrelas{font-size:28px;color:#f4b400;}
.estrelas span{opacity:0;display:inline-block;transform:scale(0.5);animation:aparecerEstrela 0.6s forwards;}
@keyframes aparecerEstrela{to{opacity:1;transform:scale(1);}}
footer{background:#0a1f44;color:white;padding:30px 20px;}
.whatsapp-float{position:fixed;width:60px;height:60px;bottom:20px;right:20px;background:#25D366;color:white;border-radius:50%;text-align:center;font-size:30px;line-height:60px;text-decoration:none;box-shadow:0 4px 10px rgba(0,0,0,0.3);}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;z-index:999;}
.modal-conteudo{background:white;padding:30px;border-radius:12px;max-width:500px;width:90%;text-align:center;position:relative;}
.fechar{position:absolute;top:15px;right:20px;font-size:24px;cursor:pointer;}
</style>

</head>
<body>

<header>
<div class="container">
<h1><!-- NOME DA EMPRESA AQUI --></h1>

FALAR NO WHATSAPP

</div>
</header>

<section>
<div class="container">
<h2>Serviços</h2>

<div class="servicos">

<div class="card" onclick="abrirModal('servico1')">
<h3><!-- SERVIÇO 1 --></h3>
<p><!-- DESCRIÇÃO SERVIÇO 1 --></p>
</div>

<div class="card" onclick="abrirModal('servico2')">
<h3><!-- SERVIÇO 2 --></h3>
<p><!-- DESCRIÇÃO SERVIÇO 2 --></p>
</div>

<div class="card" onclick="abrirModal('servico3')">
<h3><!-- SERVIÇO 3 --></h3>
<p><!-- DESCRIÇÃO SERVIÇO 3 --></p>
</div>

<div class="card" onclick="abrirModal('servico4')">
<h3><!-- SERVIÇO 4 --></h3>
<p><!-- DESCRIÇÃO SERVIÇO 4 --></p>
</div>

</div>
</div>
</section>

<section class="avaliacoes">
<div class="container">
<h2>Avaliação dos Clientes</h2>
<p class="estrelas">
<span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
</p>
<p><!-- AVALIAÇÃO EX: 5.0 de 5 estrelas no Google --></p>
<a href="<!-- LINK PARA AVALIAÇÕES -->" target="_blank" class="btn-avaliacoes">
⭐ Ver Avaliações no Google
</a>
</div>
</section>

<footer>
<div class="container">
<p><strong><!-- NOME DA EMPRESA AQUI --></strong></p>
<p><!-- ATENDIMENTO LOCALIDADE --></p>
<p>WhatsApp: <!-- (DD) NÚMERO --></p>

<p>© <!-- ANO --> Todos os direitos reservados</p>
</div>
</footer>

<a href="<!-- LINK DO WHATSAPP Floater -->" target="_blank" class="whatsapp-float">💬</a>

<div id="modal" class="modal">
<div class="modal-conteudo">
<span class="fechar" onclick="fecharModal()">&times;</span>
<h3 id="modal-titulo"></h3>
<p id="modal-texto"></p>
<br>
<a href="<!-- LINK DO WHATSAPP NO MODAL -->" target="_blank" class="btn-whatsapp">
Falar no WhatsApp
</a>
</div>
</div>

<script>
function abrirModal(tipo){
const titulo=document.getElementById("modal-titulo");
const texto=document.getElementById("modal-texto");

if(tipo==="servico1"){titulo.innerText="<!-- SERVIÇO 1 -->";texto.innerText="<!-- DESCRIÇÃO COMPLETA SERVIÇO 1 -->";}
if(tipo==="servico2"){titulo.innerText="<!-- SERVIÇO 2 -->";texto.innerText="<!-- DESCRIÇÃO COMPLETA SERVIÇO 2 -->";}
if(tipo==="servico3"){titulo.innerText="<!-- SERVIÇO 3 -->";texto.innerText="<!-- DESCRIÇÃO COMPLETA SERVIÇO 3 -->";}
if(tipo==="servico4"){titulo.innerText="<!-- SERVIÇO 4 -->";texto.innerText="<!-- DESCRIÇÃO COMPLETA SERVIÇO 4 -->";}

document.getElementById("modal").style.display="flex";
}

function fecharModal(){
document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
